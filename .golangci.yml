version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - errorlint
    - gosec
    - govet
    - staticcheck
    - unused
  settings:
    gosec:
      excludes:
        - G114 # net/http serve without timeouts — server sets ReadHeaderTimeout
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
