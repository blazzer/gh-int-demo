run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - errorlint
    - gosec
    - govet
    - staticcheck
    - unused

linters-settings:
  gosec:
    excludes:
      - G114 # net/http serve without timeouts — server sets ReadHeaderTimeout

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
