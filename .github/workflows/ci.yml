name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (short)
        run: go test ./... -short -count=1 -timeout 120s

      - name: Test (race)
        run: go test ./... -race -count=1 -timeout 300s

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
